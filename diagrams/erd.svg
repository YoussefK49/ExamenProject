<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica,Arial,sans-serif">
<style>
  .tbl{fill:#1F1C18;stroke:#E8A33D;stroke-width:1.5;}
  .hdr{fill:#E8A33D;}
  .hdrtxt{fill:#14120F;font-weight:700;font-size:13px;}
  .field{fill:#F5F1EA;font-size:11.5px;}
  .pk{fill:#E8A33D;font-size:11.5px;font-weight:700;}
  .line{stroke:#8A8378;stroke-width:1.3;fill:none;}
  .lbl{fill:#8A8378;font-size:10px;}
  rect{rx:2;}
</style>
<rect width="960" height="560" fill="#0F0D0B"/>

<!-- users -->
<g transform="translate(30,40)">
  <rect class="tbl" width="190" height="150"/>
  <rect class="hdr" width="190" height="26"/>
  <text x="10" y="18" class="hdrtxt">users</text>
  <text x="10" y="46" class="pk">PK id</text>
  <text x="10" y="64" class="field">username</text>
  <text x="10" y="82" class="field">email</text>
  <text x="10" y="100" class="field">password_hash</text>
  <text x="10" y="118" class="field">bio, avatar_url</text>
  <text x="10" y="136" class="field">created_at</text>
</g>

<!-- posts -->
<g transform="translate(370,40)">
  <rect class="tbl" width="190" height="150"/>
  <rect class="hdr" width="190" height="26"/>
  <text x="10" y="18" class="hdrtxt">posts</text>
  <text x="10" y="46" class="pk">PK id</text>
  <text x="10" y="64" class="field">FK user_id</text>
  <text x="10" y="82" class="field">image_url</text>
  <text x="10" y="100" class="field">caption</text>
  <text x="10" y="118" class="field">location</text>
  <text x="10" y="136" class="field">created_at</text>
</g>

<!-- likes -->
<g transform="translate(370,270)">
  <rect class="tbl" width="190" height="115"/>
  <rect class="hdr" width="190" height="26"/>
  <text x="10" y="18" class="hdrtxt">likes</text>
  <text x="10" y="46" class="pk">PK id</text>
  <text x="10" y="64" class="field">FK post_id</text>
  <text x="10" y="82" class="field">FK user_id</text>
  <text x="10" y="100" class="field">created_at</text>
</g>

<!-- comments -->
<g transform="translate(710,270)">
  <rect class="tbl" width="190" height="132"/>
  <rect class="hdr" width="190" height="26"/>
  <text x="10" y="18" class="hdrtxt">comments</text>
  <text x="10" y="46" class="pk">PK id</text>
  <text x="10" y="64" class="field">FK post_id</text>
  <text x="10" y="82" class="field">FK user_id</text>
  <text x="10" y="100" class="field">content</text>
  <text x="10" y="118" class="field">created_at</text>
</g>

<!-- follows -->
<g transform="translate(30,270)">
  <rect class="tbl" width="220" height="115"/>
  <rect class="hdr" width="220" height="26"/>
  <text x="10" y="18" class="hdrtxt">follows</text>
  <text x="10" y="46" class="pk">PK id</text>
  <text x="10" y="64" class="field">FK follower_id  -&gt; users.id</text>
  <text x="10" y="82" class="field">FK following_id -&gt; users.id</text>
  <text x="10" y="100" class="field">created_at</text>
</g>

<!-- relations -->
<path class="line" d="M220,90 L370,90"/>
<text x="260" y="82" class="lbl">1 user - N posts</text>

<path class="line" d="M220,150 Q220,215 370,320"/>
<text x="230" y="220" class="lbl">1 user - N likes</text>

<path class="line" d="M465,190 L465,270"/>
<text x="470" y="235" class="lbl">1 post - N likes</text>

<path class="line" d="M560,320 L710,320"/>
<text x="580" y="312" class="lbl">1 post - N comments</text>

<path class="line" d="M220,110 Q290,180 220,270"/>
<text x="150" y="200" class="lbl">1 user - N follows</text>

<path class="line" d="M900,270 Q940,150 560,110"/>
<text x="880" y="200" class="lbl">1 user - N comments</text>

<text x="30" y="530" fill="#8A8378" font-size="12">ERD — Kiekje database (zie database/schema.sql)</text>
</svg>
