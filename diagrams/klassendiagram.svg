<svg viewBox="0 0 980 520" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica,Arial,sans-serif">
<style>
  .cls{fill:#1F1C18;stroke:#D9667A;stroke-width:1.5;}
  .hdr{fill:#D9667A;}
  .hdrtxt{fill:#14120F;font-weight:700;font-size:13px;}
  .m{fill:#F5F1EA;font-size:11px;}
  .sep{stroke:#8A8378;stroke-width:1;}
  .line{stroke:#8A8378;stroke-width:1.3;fill:none;marker-end:url(#arrow);}
  .lbl{fill:#8A8378;font-size:10px;}
</style>
<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6 Z" fill="#8A8378"/>
  </marker>
</defs>
<rect width="980" height="520" fill="#0F0D0B"/>

<!-- User -->
<g transform="translate(40,40)">
  <rect class="cls" width="220" height="190"/>
  <rect class="hdr" width="220" height="26"/>
  <text x="10" y="18" class="hdrtxt">User</text>
  <line x1="0" y1="60" x2="220" y2="60" class="sep"/>
  <text x="8" y="45" class="m">- id: int</text>
  <text x="8" y="?" class="m"></text>
  <text x="8" y="?" class="m"></text>
  <text x="8" y="78" class="m">- username: string</text>
  <text x="8" y="96" class="m">- email: string</text>
  <text x="8" y="114" class="m">- passwordHash: string</text>
  <text x="8" y="132" class="m">+ register(): bool</text>
  <text x="8" y="150" class="m">+ login(pass): bool</text>
  <text x="8" y="168" class="m">+ follow(user: User)</text>
</g>

<!-- Post -->
<g transform="translate(380,40)">
  <rect class="cls" width="220" height="170"/>
  <rect class="hdr" width="220" height="26"/>
  <text x="10" y="18" class="hdrtxt">Post</text>
  <line x1="0" y1="60" x2="220" y2="60" class="sep"/>
  <text x="8" y="45" class="m">- id: int</text>
  <text x="8" y="78" class="m">- imageUrl: string</text>
  <text x="8" y="96" class="m">- caption: string</text>
  <text x="8" y="114" class="m">- createdAt: datetime</text>
  <text x="8" y="132" class="m">+ like(user: User)</text>
  <text x="8" y="150" class="m">+ addComment(text)</text>
</g>

<!-- Like -->
<g transform="translate(720,40)">
  <rect class="cls" width="220" height="110"/>
  <rect class="hdr" width="220" height="26"/>
  <text x="10" y="18" class="hdrtxt">Like</text>
  <line x1="0" y1="60" x2="220" y2="60" class="sep"/>
  <text x="8" y="45" class="m">- id: int</text>
  <text x="8" y="78" class="m">- postId: int</text>
  <text x="8" y="96" class="m">- userId: int</text>
</g>

<!-- Comment -->
<g transform="translate(720,280)">
  <rect class="cls" width="220" height="130"/>
  <rect class="hdr" width="220" height="26"/>
  <text x="10" y="18" class="hdrtxt">Comment</text>
  <line x1="0" y1="60" x2="220" y2="60" class="sep"/>
  <text x="8" y="45" class="m">- id: int</text>
  <text x="8" y="78" class="m">- content: string</text>
  <text x="8" y="96" class="m">- postId: int</text>
  <text x="8" y="114" class="m">- userId: int</text>
</g>

<!-- AuthService -->
<g transform="translate(40,280)">
  <rect class="cls" width="240" height="130"/>
  <rect class="hdr" width="240" height="26"/>
  <text x="10" y="18" class="hdrtxt">AuthService</text>
  <line x1="0" y1="60" x2="240" y2="60" class="sep"/>
  <text x="8" y="45" class="m">+ hashPassword(pw): string</text>
  <text x="8" y="78" class="m">+ verifyPassword(pw,hash)</text>
  <text x="8" y="96" class="m">+ preventSqlInjection()</text>
</g>

<path class="line" d="M260,90 L380,90"/>
<text x="285" y="82" class="lbl">1  ..  *</text>

<path class="line" d="M600,90 L720,90"/>
<text x="620" y="82" class="lbl">1  ..  *</text>

<path class="line" d="M830,150 L830,280"/>

<path class="line" d="M150,230 L150,280"/>
<text x="155" y="255" class="lbl">gebruikt</text>

<path class="line" d="M280,345 L720,345"/>
<text x="450" y="337" class="lbl">valideert</text>

<text x="40" y="490" fill="#8A8378" font-size="12">Klassendiagram — Kiekje kernmodel</text>
</svg>
