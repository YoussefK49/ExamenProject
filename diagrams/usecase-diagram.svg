<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica,Arial,sans-serif">
<style>
  .actor{stroke:#F5F1EA;stroke-width:1.5;fill:none;}
  .actortxt{fill:#F5F1EA;font-size:12px;text-anchor:middle;}
  .oval{fill:#1F1C18;stroke:#E8A33D;stroke-width:1.5;}
  .otxt{fill:#F5F1EA;font-size:11.5px;text-anchor:middle;}
  .line{stroke:#8A8378;stroke-width:1.2;}
  .boundary{fill:none;stroke:#332E27;stroke-width:1;stroke-dasharray:4 3;}
  .lbl{fill:#8A8378;font-size:11px;}
</style>
<rect width="900" height="560" fill="#0F0D0B"/>
<text x="450" y="30" fill="#F5F1EA" font-size="16" text-anchor="middle" font-weight="700">Use Case Diagram — Kiekje</text>

<rect class="boundary" x="180" y="55" width="620" height="470"/>

<!-- actor: Gebruiker -->
<g transform="translate(60,240)">
  <circle cx="20" cy="10" r="10" class="actor"/>
  <line x1="20" y1="20" x2="20" y2="55" class="actor"/>
  <line x1="0" y1="32" x2="40" y2="32" class="actor"/>
  <line x1="20" y1="55" x2="5" y2="80" class="actor"/>
  <line x1="20" y1="55" x2="35" y2="80" class="actor"/>
  <text x="20" y="98" class="actortxt">Gebruiker</text>
</g>

<!-- use cases -->
<g>
  <ellipse cx="330" cy="90" rx="95" ry="28" class="oval"/>
  <text x="330" y="94" class="otxt">Account aanmaken</text>

  <ellipse cx="330" cy="160" rx="80" ry="28" class="oval"/>
  <text x="330" y="164" class="otxt">Inloggen</text>

  <ellipse cx="500" cy="90" rx="90" ry="28" class="oval"/>
  <text x="500" y="94" class="otxt">Kiekje plaatsen</text>

  <ellipse cx="500" cy="160" rx="90" ry="28" class="oval"/>
  <text x="500" y="164" class="otxt">Feed bekijken</text>

  <ellipse cx="670" cy="90" rx="80" ry="28" class="oval"/>
  <text x="670" y="94" class="otxt">Liken</text>

  <ellipse cx="670" cy="160" rx="90" ry="28" class="oval"/>
  <text x="670" y="164" class="otxt">Reageren</text>

  <ellipse cx="330" cy="240" rx="90" ry="28" class="oval"/>
  <text x="330" y="244" class="otxt">Gebruiker volgen</text>

  <ellipse cx="500" cy="240" rx="90" ry="28" class="oval"/>
  <text x="500" y="244" class="otxt">Profiel bekijken</text>

  <ellipse cx="670" cy="240" rx="90" ry="28" class="oval"/>
  <text x="670" y="244" class="otxt">Verhaal plaatsen</text>
</g>

<!-- teamlead / examinator actor -->
<g transform="translate(760,340)">
  <circle cx="20" cy="10" r="10" class="actor"/>
  <line x1="20" y1="20" x2="20" y2="55" class="actor"/>
  <line x1="0" y1="32" x2="40" y2="32" class="actor"/>
  <line x1="20" y1="55" x2="5" y2="80" class="actor"/>
  <line x1="20" y1="55" x2="35" y2="80" class="actor"/>
  <text x="20" y="98" class="actortxt">Teamlead</text>
</g>
<ellipse cx="600" cy="380" rx="110" ry="28" class="oval"/>
<text x="600" y="384" class="otxt">Voortgangsgesprek</text>
<line x1="710" y1="380" x2="780" y2="380" class="line"/>

<!-- connections -->
<line x1="90" y1="260" x2="235" y2="90" class="line"/>
<line x1="90" y1="260" x2="250" y2="160" class="line"/>
<line x1="90" y1="260" x2="410" y2="90" class="line"/>
<line x1="90" y1="260" x2="410" y2="160" class="line"/>
<line x1="90" y1="260" x2="590" y2="90" class="line"/>
<line x1="90" y1="260" x2="580" y2="160" class="line"/>
<line x1="90" y1="260" x2="250" y2="240" class="line"/>
<line x1="90" y1="260" x2="420" y2="240" class="line"/>
<line x1="90" y1="260" x2="600" y2="240" class="line"/>

<text x="60" y="480" class="lbl">Alle use cases vereisen "Inloggen" (&lt;&lt;include&gt;&gt;), behalve Account aanmaken.</text>
</svg>
