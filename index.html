<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram Home</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-gradient">insta</span>
      <span>gram</span>
    </div>
    <div class="top-actions">
      <button class="icon-btn" aria-label="Berichten">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 2H3C1.9 2 1 2.9 1 4V20L5 16H21C22.1 16 23 15.1 23 14V4C23 2.9 22.1 2 21 2Z"/></svg>
      </button>
      <button class="icon-btn" aria-label="Activity">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35Z"/></svg>
      </button>
    </div>
  </header>

  <main class="content">
    <section class="story-strip">
      <div class="story-item story-add">
        <div class="story-ring">
          <div class="story-avatar">+</div>
        </div>
        <span>Jouw verhaal</span>
      </div>
      <div class="story-item">
        <div class="story-ring"><div class="story-avatar">A</div></div>
        <span>Anna</span>
      </div>
      <div class="story-item">
        <div class="story-ring"><div class="story-avatar">B</div></div>
        <span>Bas</span>
      </div>
      <div class="story-item">
        <div class="story-ring"><div class="story-avatar">C</div></div>
        <span>Celine</span>
      </div>
      <div class="story-item">
        <div class="story-ring"><div class="story-avatar">D</div></div>
        <span>Daan</span>
      </div>
    </section>

    <section class="feed">
      <article class="post-card">
        <div class="post-header">
          <div class="profile">
            <div class="profile-avatar">A</div>
            <div>
              <p class="profile-name">anna.nl</p>
              <p class="profile-location">Amsterdam</p>
            </div>
          </div>
          <button class="more-btn">...</button>
        </div>
        <div class="post-image image-gradient"></div>
        <div class="post-actions">
          <div class="actions-left">
            <button class="icon-btn"><span>♥</span></button>
            <button class="icon-btn"><span>💬</span></button>
            <button class="icon-btn"><span>✈</span></button>
          </div>
          <button class="icon-btn"><span>🔖</span></button>
        </div>
        <div class="post-details">
          <p class="likes">1.234 vind-ik-leuks</p>
          <p><span class="profile-name">anna.nl</span> Zonsondergang bij de gracht 🌇</p>
        </div>
      </article>

      <article class="post-card">
        <div class="post-header">
          <div class="profile">
            <div class="profile-avatar">B</div>
            <div>
              <p class="profile-name">bas_foto</p>
              <p class="profile-location">Rotterdam</p>
            </div>
          </div>
          <button class="more-btn">...</button>
        </div>
        <div class="post-image image-city"></div>
        <div class="post-actions">
          <div class="actions-left">
            <button class="icon-btn"><span>♥</span></button>
            <button class="icon-btn"><span>💬</span></button>
            <button class="icon-btn"><span>✈</span></button>
          </div>
          <button class="icon-btn"><span>🔖</span></button>
        </div>
        <div class="post-details">
          <p class="likes">862 vind-ik-leuks</p>
          <p><span class="profile-name">bas_foto</span> Streetstyle vibes in de stad ✨</p>
        </div>
      </article>
    </section>
  </main>

  <nav class="bottom-nav">
    <button class="nav-btn active">🏠<span>Home</span></button>
    <button class="nav-btn">🔍<span>Zoek</span></button>
    <button class="nav-btn">🎬<span>Reels</span></button>
    <button class="nav-btn">🛍️<span>Shop</span></button>
    <button class="nav-btn">👤<span>Profiel</span></button>
  </nav>
</body>
</html>
