<svg viewBox="0 0 500 700" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica,Arial,sans-serif">
<style>
  .start{fill:#F5F1EA;}
  .act{fill:#1F1C18;stroke:#E8A33D;stroke-width:1.5;rx:16;}
  .atxt{fill:#F5F1EA;font-size:12px;text-anchor:middle;}
  .dec{fill:#1F1C18;stroke:#D9667A;stroke-width:1.5;}
  .dtxt{fill:#F5F1EA;font-size:11px;text-anchor:middle;}
  .arr{stroke:#8A8378;stroke-width:1.3;marker-end:url(#a2);}
  .lbl{fill:#8A8378;font-size:10px;}
</style>
<defs><marker id="a2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
  <path d="M0,0 L8,3 L0,6 Z" fill="#8A8378"/></marker></defs>
<rect width="500" height="700" fill="#0F0D0B"/>
<text x="250" y="26" fill="#F5F1EA" font-size="15" text-anchor="middle" font-weight="700">Activity Diagram — Kiekje plaatsen</text>

<circle class="start" cx="250" cy="55" r="10"/>
<line class="arr" x1="250" y1="65" x2="250" y2="95"/>

<rect class="act" x="140" y="95" width="220" height="40"/>
<text x="250" y="120" class="atxt">Gebruiker klikt op "+"</text>
<line class="arr" x1="250" y1="135" x2="250" y2="165"/>

<rect class="act" x="140" y="165" width="220" height="40"/>
<text x="250" y="190" class="atxt">Foto selecteren</text>
<line class="arr" x1="250" y1="205" x2="250" y2="235"/>

<rect class="act" x="140" y="235" width="220" height="40"/>
<text x="250" y="260" class="atxt">Bijschrift toevoegen</text>
<line class="arr" x1="250" y1="275" x2="250" y2="305"/>

<polygon class="dec" points="250,305 320,345 250,385 180,345"/>
<text x="250" y="349" class="dtxt">Geldige foto?</text>

<line class="arr" x1="320" y1="345" x2="400" y2="345"/>
<text x="345" y="335" class="lbl">nee</text>
<rect class="act" x="330" y="365" width="140" height="40"/>
<text x="400" y="390" class="atxt" font-size="10">Foutmelding tonen</text>
<line class="arr" x1="400" y1="365" x2="360" y2="345"/>

<line class="arr" x1="250" y1="385" x2="250" y2="415"/>
<text x="260" y="405" class="lbl">ja</text>

<rect class="act" x="140" y="415" width="220" height="40"/>
<text x="250" y="440" class="atxt">POST /api/posts.php</text>
<line class="arr" x1="250" y1="455" x2="250" y2="485"/>

<rect class="act" x="140" y="485" width="220" height="40"/>
<text x="250" y="510" class="atxt">Opslaan in database (prepared stmt)</text>
<line class="arr" x1="250" y1="525" x2="250" y2="555"/>

<rect class="act" x="140" y="555" width="220" height="40"/>
<text x="250" y="580" class="atxt">Feed vernieuwen &amp; tonen</text>
<line class="arr" x1="250" y1="595" x2="250" y2="625"/>

<circle class="start" cx="250" cy="635" r="10" fill="none" stroke="#F5F1EA" stroke-width="2"/>
<circle class="start" cx="250" cy="635" r="5"/>
</svg>
